name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker services
        run: docker compose up -d --wait

      - name: Frontend lint
        run: make lint-frontend

      - name: Frontend typecheck
        run: make typecheck

      - name: Frontend test
        run: make test-frontend

      - name: Backend lint
        run: make lint

      - name: Backend test
        run: make test
