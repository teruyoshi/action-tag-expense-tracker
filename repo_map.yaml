project:
  name: action-tag-expense-tracker
  architecture: monorepo (Go + React)
  database: MySQL

domain:
  entities:
    ActionTag:
      fields: [id, name]

    Event:
      fields: [id, date, action_tag_id]
      relations:
        - belongs_to: ActionTag
        - has_many: Expense

    Expense:
      fields: [id, event_id, item, amount]

    Balance:
      fields: [id, amount]

  flow: ActionTag → Event → Expense

backend:
  language: Go
  framework: chi + GORM

  structure:
    handlers:
      responsibility: HTTP handling (validation + response)
      examples:
        - action_tag.go (CRUD)
        - expense.go (Create, Update)
        - summary.go (aggregation)
        - balance.go (state update)

    repositories:
      responsibility: DB access (GORM + raw SQL)
      notes:
        - summary uses raw SQL for aggregation

    services:
      responsibility: business logic
      notes:
        - only BalanceService exists
        - handles balance update + auto expense creation

  api_routes:
    - GET /tags
    - POST /tags
    - PUT /tags/{id}
    - DELETE /tags/{id}
    - POST /events
    - POST /expenses
    - PUT /expenses/{id}
    - GET /summary/month
    - GET /summary/tag
    - GET /summary/tag/diff
    - GET /summary/tag/details
    - GET /balance
    - PUT /balance

frontend:
  framework: React

  routing:
    - /
    - /tags/select
    - /expense/new
    - /tags/manage
    - /tags/:tagId/details

  flow:
    - TagSelect → ExpenseInput
    - Home → TagDetails

  state_management:
    hooks:
      - useBalance
      - useTags
      - useExpenses

use_cases:
  create_expense_flow:
    steps:
      - select tag
      - create event
      - create expenses

  manage_tags:
    operations:
      - CRUD

  view_summary:
    endpoints:
      - /summary/month
      - /summary/tag
      - /summary/tag/diff

  update_balance:
    note:
      - decreasing balance triggers expense creation

infrastructure:
  docker:
    services: [db, backend, frontend, e2e]

  ci:
    system: GitHub Actions
    steps:
      - lint
      - test
      - e2e
      - security

constraints:
  - services layer is minimal (only BalanceService)
  - summary aggregation is repository-driven (not service)
  - frontend error handling is minimal (alert)
