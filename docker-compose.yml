services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: expense_tracker
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "root:root@tcp(db:3306)/expense_tracker?charset=utf8mb4&parseTime=True&loc=Local"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/balance"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5173 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  e2e:
    build: ./e2e
    volumes:
      - ./e2e:/app
      - /app/node_modules
    environment:
      - CI=true
    depends_on:
      frontend:
        condition: service_healthy
    profiles:
      - e2e

volumes:
  db_data:
